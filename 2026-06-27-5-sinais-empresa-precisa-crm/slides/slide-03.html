  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:1080px;height:1350px;}
  body{font-family:'Geist','Segoe UI',Arial,sans-serif;color:#EDEDED;
    -webkit-font-smoothing:antialiased;text-rendering:geometricPrecision;
    font-feature-settings:"cv01","ss01";}
  .mono{font-family:'Geist Mono',ui-monospace,'Consolas',monospace;font-variant-numeric:tabular-nums;}

  /* canvas: near-black + atmosfera ambar low-alpha + grao */
  .slide{position:relative;width:1080px;height:1350px;overflow:hidden;
    display:flex;flex-direction:column;padding:88px 88px 72px;background:#0A0A0A;
    background-image:
      radial-gradient(42% 30% at 88% -6%, rgba(251,191,36,.10), transparent 60%),
      radial-gradient(38% 26% at -8% 108%, rgba(251,191,36,.045), transparent 60%);}
  .grain{position:absolute;inset:0;z-index:1;background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter%20id='n'%3E%3CfeTurbulence%20type='fractalNoise'%20baseFrequency='0.65'%20numOctaves='3'%20stitchTiles='stitch'/%3E%3C/filter%3E%3Crect%20width='100%25'%20height='100%25'%20filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:182px 182px;opacity:.08;mix-blend-mode:overlay;pointer-events:none;}
  .z{position:relative;z-index:2;}
  .grow{flex:1 1 auto;}

  /* type */
  h1{font-weight:640;letter-spacing:-.03em;line-height:1.06;color:#EDEDED;text-wrap:balance;}
  .body{color:rgba(237,237,237,.62);font-weight:420;line-height:1.46;letter-spacing:-.01em;text-wrap:pretty;}
  .kick{font-size:19px;letter-spacing:.24em;text-transform:uppercase;color:#FBBF24;font-weight:500;}
  .rule{height:1px;background:rgba(255,255,255,.10);}

  /* top bar */
  .top{display:flex;align-items:center;justify-content:space-between;}
  .brand{display:flex;align-items:center;gap:13px;}
  .brand img{width:38px;height:38px;object-fit:contain;display:block;}
  .brand b{font-size:29px;font-weight:600;letter-spacing:-.02em;}
  .idx{display:flex;align-items:center;gap:16px;}
  .idx .n{font-size:17px;letter-spacing:.18em;color:rgba(237,237,237,.40);}
  .idx .track{width:120px;height:2px;background:rgba(255,255,255,.13);position:relative;overflow:hidden;}
  .idx .fill{position:absolute;left:0;top:0;height:100%;background:#FBBF24;}

  /* footer */
  .foot{display:flex;align-items:center;justify-content:space-between;}
  .foot .site{display:flex;align-items:center;gap:10px;color:rgba(237,237,237,.40);font-size:19px;letter-spacing:.02em;}
  .foot .site img{width:22px;height:22px;object-fit:contain;}
  .foot .site b{color:#FBBF24;font-weight:500;}
  .foot .right{display:flex;align-items:center;gap:9px;}
  .dots{display:flex;gap:8px;}
  .dots i{width:8px;height:8px;border-radius:50%;background:rgba(237,237,237,.24);display:block;}
  .dots i.on{background:#FBBF24;}
  .swipe{display:flex;align-items:center;gap:11px;font-size:19px;color:#EDEDED;letter-spacing:.01em;}
  .swipe svg{width:22px;height:22px;color:#FBBF24;}

  /* big index numeral */
  .bignum{font-weight:680;line-height:.8;letter-spacing:-.05em;flex:0 0 auto;}
  .bignum.fill{background:linear-gradient(168deg,#FCD34D,#F59E0B);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 26px 60px rgba(245,158,11,.20));}
  .bignum.outline{color:transparent;-webkit-text-stroke:3.5px #FBBF24;
    filter:drop-shadow(0 18px 44px rgba(245,158,11,.12));}

  /* signal */
  .sig{display:flex;align-items:center;gap:48px;}
  .sig .num{width:300px;display:flex;justify-content:center;}
  .sig .bignum{font-size:392px;}
  .sig .txt{flex:1 1 auto;min-width:0;}
  .sig h1{font-size:55px;max-width:540px;margin-top:18px;}
  .sig .body{font-size:26px;max-width:512px;margin-top:20px;}

  .cost{display:flex;align-items:center;gap:20px;border:1px solid rgba(255,255,255,.10);border-radius:20px;
    padding:24px 28px;background:rgba(255,255,255,.045);}
  .cost .ic{width:52px;height:52px;border-radius:14px;border:1px solid rgba(251,191,36,.45);
    color:#FBBF24;display:grid;place-items:center;flex:0 0 auto;}
  .cost .ic svg{width:24px;height:24px;}
  .cost .lab{font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:rgba(237,237,237,.40);}
  .cost .ct{font-size:24px;font-weight:520;color:#EDEDED;margin-top:6px;letter-spacing:-.015em;}

  /* cover */
  .cover .eye{font-size:19px;letter-spacing:.24em;text-transform:uppercase;color:#FBBF24;font-weight:500;}
  .five-row{display:flex;align-items:flex-end;gap:30px;margin-top:18px;}
  .five-row .bignum{font-size:300px;}
  .five-row .word{font-size:112px;font-weight:660;letter-spacing:-.035em;line-height:.82;padding-bottom:30px;color:#EDEDED;}
  .cover h1{font-size:66px;max-width:840px;margin-top:30px;}
  .cover .sub{font-size:28px;max-width:660px;margin-top:24px;}

  /* payoff */
  .payoff h1{font-size:60px;max-width:840px;margin-top:16px;}
  .checks{display:flex;flex-direction:column;gap:14px;}
  .check{display:flex;align-items:center;gap:20px;border:1px solid rgba(255,255,255,.10);border-radius:18px;
    padding:22px 26px;background:rgba(255,255,255,.045);}
  .check .tick{width:44px;height:44px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;
    background:rgba(251,191,36,.13);border:1px solid rgba(251,191,36,.40);color:#FBBF24;}
  .check .tick svg{width:23px;height:23px;}
  .check .ct{font-size:25px;font-weight:520;letter-spacing:-.015em;color:#EDEDED;}
  .check .was{margin-left:auto;font-size:15px;letter-spacing:.12em;color:rgba(237,237,237,.40);}

  /* cta */
  .cta h1{font-size:68px;max-width:860px;margin-top:16px;}
  .cta .sub{font-size:28px;max-width:680px;margin-top:22px;}
  .composer{display:flex;align-items:center;gap:18px;border:1px solid rgba(251,191,36,.45);
