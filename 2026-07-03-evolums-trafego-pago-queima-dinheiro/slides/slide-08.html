  /* contador rodapé */
  .counter{display:flex;align-items:center;gap:18px;}

  .counter .t{font-size:22px;color:#9A9A9D;margin-left:-10px;}
  .counter .line{height:1.5px;flex:1 1 auto;background:#E4E1DC;max-width:230px;}

  /* área central do texto — posição vertical varia por slide (top/center/bottom) */
  .mid{flex:1 1 auto;display:flex;flex-direction:column;padding:10px 0;}

  /* cover */
  .cover h1{font-size:82px;max-width:720px;margin-top:14px;}

  /* content */

  .cta .sub{font-size:28px;max-width:560px;margin-top:24px;}
  .pill{display:inline-flex;align-items:center;gap:16px;background:#FF4002;color:#fff;

  .pill .arw svg{width:24px;height:24px;}
  .handle{margin-top:22px;font-size:20px;color:#6B6B6E;font-weight:500;}
